name: 順位表の毎日更新

on:
  schedule:
    - cron: "0 21 * * *"   # UTC 21:00 = 日本時間 朝6:00
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: 依存パッケージ
        run: pip install -r scraper/requirements.txt

      - name: 収集・解析
        run: python scraper/scrape.py
        working-directory: .
        env:
          PYTHONPATH: scraper

      - name: 差分があればコミット(→Netlifyが自動デプロイ)
        run: |
          git config user.name "league-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "データ更新 $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            git push
          fi
